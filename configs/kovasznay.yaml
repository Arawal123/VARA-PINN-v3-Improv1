benchmark: kovasznay
seed: 0
deterministic: true
device: auto

benchmark_params:
  reynolds: 40.0
  x_min: -0.5
  x_max: 1.0
  y_min: -0.5
  y_max: 1.5

pde:
  steady: true

model:
  input_dim: 2
  output_dim: 3
  hidden_layers: [96, 96, 96, 96, 96]
  activation: tanh

optimizer:
  name: adam
  lr: 0.001

training:
  adaptive_cycles: 6
  epochs_per_cycle: 1000
  log_every: 250
  n_collocation: 12000
  n_boundary: 2500
  n_data: 1000
  weights:
    pde: 1.0
    momentum_u: 1.0
    momentum_v: 1.0
    continuity: 1.0
    bc: 5.0
    u: 1.0
    v: 1.0
    p: 1.0
    omega: 0.5
    pressure_gradient: 0.2
    pressure_poisson: 0.0
    vorticity_transport: 0.0

validation:
  nx: 70
  ny: 70

test:
  nx: 100
  ny: 100

diagnostics:
  mode: full_reference
  variables:
    - u_error
    - v_error
    - p_error_mean_centered
    - pressure_gradient_error
    - speed_error
    - omega_error
    - continuity_residual
    - momentum_u_residual
    - momentum_v_residual
    - aggregate_pde_residual
    - boundary_violation
  aggregation: mean
  aggregation_percentile: 90.0
  normalization: percentile
  ema_rho: 0.7

patches:
  nx_patches: 4
  ny_patches: 4
  nt_patches: 1

weak_regions:
  percentile_threshold: 75.0
  top_k_per_variable: 1
  min_active_patches: 1
  max_active_patches: 6
  persistence_cycles: 1

controller:
  strength: 1.0
  max_actions_per_cycle: 8
  constrained: false
  trial_epochs: 100
  min_improvement: 0.005
  collateral_tolerance: 0.10
  pressure_collateral_tolerance: 0.05
  objective_weights:
    u_rel_l2: 1.0
    v_rel_l2: 1.0
    p_rel_l2_centered: 1.5
    omega_rel_l2: 1.0
    pde_residual_mean: 0.25
  entropy_weight: 0.0

local_controller:
  enabled: true
  constrained: true
  min_improvement: 0.005
  collateral_tolerance: 0.10
  pressure_collateral_tolerance: 0.05
  trial_epochs: 100
  max_actions_per_cycle: 6
  initial_strength: 1.0
  damping_factor: 0.5
  local_velocity_weight_max: 2.0
  local_pressure_weight_max: 3.0
  local_omega_weight_max: 2.0
  local_pde_weight_max: 2.0
  local_bc_weight_max: 7.0
  objective_weights:
    u: 1.0
    v: 1.0
    p: 1.5
    omega: 1.0
    residual: 0.25

sampling:
  mixture:
    uniform: 0.50
    pde_residual: 0.25
    pressure_vorticity: 0.10
    velocity: 0.10
    boundary: 0.05

experiments:
  root: experiments
