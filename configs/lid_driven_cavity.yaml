benchmark: lid_driven_cavity
seed: 0
deterministic: true
device: auto

benchmark_params:
  reynolds: 100.0
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  lid_velocity: 1.0
  reference: ghia
  reference_path: null
  full_field_reference_path: null
  profile_only: true

pde:
  steady: true

model:
  input_dim: 2
  output_dim: 3
  hidden_layers: [64, 64, 64]
  activation: tanh

optimizer:
  name: adam
  lr: 0.001

training:
  adaptive_cycles: 2
  epochs_per_cycle: 30
  log_every: 10
  n_collocation: 512
  n_boundary: 128
  n_data: 0
  weights:
    pde: 1.0
    momentum_u: 1.0
    momentum_v: 1.0
    continuity: 1.0
    bc: 5.0
    u: 0.0
    v: 0.0
    p: 0.0
    omega: 0.0
    pressure_gradient: 0.0
    u_profile: 2.0
    v_profile: 2.0
    profile: 0.0

validation:
  nx: 36
  ny: 36

test:
  nx: 48
  ny: 48

diagnostics:
  mode: residual_only
  variables:
    - continuity_residual
    - momentum_u_residual
    - momentum_v_residual
    - aggregate_pde_residual
    - boundary_violation
    - u_profile_error
    - v_profile_error
    - profile_error
  aggregation: mean
  aggregation_percentile: 90.0
  normalization: percentile
  ema_rho: 0.7

patches:
  nx_patches: 4
  ny_patches: 4
  nt_patches: 1

weak_regions:
  percentile_threshold: 75.0
  top_k_per_variable: 1
  min_active_patches: 1
  max_active_patches: 6
  persistence_cycles: 1

local_controller:
  enabled: true
  constrained: true
  min_improvement: 0.005
  collateral_tolerance: 0.10
  pressure_collateral_tolerance: 0.05
  continuity_collateral_tolerance: 0.05
  boundary_collateral_tolerance: 0.05
  validation_loss_tolerance: 0.02
  trial_epochs: 5
  max_actions_per_cycle: 4
  initial_strength: 0.5
  damping_factor: 0.5
  tiny_j_tolerance: 0.002
  strong_target_factor: 2.0
  local_velocity_weight_max: 1.5
  local_pressure_weight_max: 1.5
  local_omega_weight_max: 1.5
  local_pde_weight_max: 1.5
  local_bc_weight_max: 4.0
  objective_weights:
    residual: 0.5
    continuity: 2.0
    momentum: 0.75
    boundary: 1.5
    unweighted_validation: 0.5
    profile: 3.0
    cavity: 1.0

sampling:
  mixture:
    uniform: 0.50
    pde_residual: 0.25
    pressure_vorticity: 0.10
    velocity: 0.10
    boundary: 0.05

experiments:
  root: experiments
