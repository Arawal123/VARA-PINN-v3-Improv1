benchmark: lid_driven_cavity
seed: 0
deterministic: true
device: auto

benchmark_params:
  reynolds: 100.0
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  lid_velocity: 1.0
  reference: ghia
  reference_path: null
  full_field_reference_path: null
  profile_only: true

pde:
  steady: true

model:
  type: streamfunction
  input_dim: 2
  output_dim: 3
  hidden_layers: [64, 64, 64]
  activation: tanh
  boundary_transform: true
  enforce_lid_profile: false
  corner_eps: 0.04
  include_vorticity_transport_loss: true

optimizer:
  name: adam
  lr: 0.001

training:
  adaptive_cycles: 6
  epochs_per_cycle: 300
  log_every: 75
  n_collocation: 4096
  n_boundary: 2048
  n_data: 0
  weights:
    pde: 1.0
    momentum_u: 1.0
    momentum_v: 1.0
    continuity: 1.0
    bc: 5.0
    u: 0.0
    v: 0.0
    p: 0.0
    omega: 0.0
    pressure_gradient: 0.0
    omega_streamfunction: 0.1
    vorticity_transport: 0.02

validation:
  nx: 48
  ny: 48

test:
  nx: 64
  ny: 64

diagnostics:
  mode: residual_only
  variables:
    - continuity_residual
    - momentum_u_residual
    - momentum_v_residual
    - aggregate_pde_residual
    - centerline_pde_residual
    - centerline_continuity_residual
    - corner_pde_residual
    - corner_boundary_violation
    - boundary_violation
  aggregation: mean
  aggregation_percentile: 90.0
  normalization: percentile
  ema_rho: 0.7

patches:
  nx_patches: 4
  ny_patches: 4
  nt_patches: 1

weak_regions:
  percentile_threshold: 75.0
  top_k_per_variable: 1
  min_active_patches: 1
  max_active_patches: 6
  persistence_cycles: 1

local_controller:
  enabled: true
  constrained: true
  min_improvement: 0.005
  collateral_tolerance: 0.10
  pressure_collateral_tolerance: 0.05
  continuity_collateral_tolerance: 0.05
  boundary_collateral_tolerance: 0.02
  validation_loss_tolerance: 0.015
  trial_epochs: 10
  max_actions_per_cycle: 3
  initial_strength: 0.35
  damping_factor: 0.5
  warmup_cycles: 1
  tiny_j_tolerance: 0.002
  strong_target_factor: 2.0
  local_velocity_weight_max: 1.5
  local_pressure_weight_max: 1.5
  local_omega_weight_max: 1.5
  local_pde_weight_max: 1.5
  local_bc_weight_max: 5.0
  objective_weights:
    residual: 0.5
    continuity: 1.75
    momentum: 0.75
    boundary: 2.0
    unweighted_validation: 0.75
    centerline_residual: 1.0
    centerline_continuity: 1.0
    corner_residual: 0.25
    corner_boundary: 0.5

sampling:
  mixture:
    uniform: 0.45
    pde_residual: 0.25
    pressure_vorticity: 0.08
    velocity: 0.10
    boundary: 0.12
  cavity_boundary:
    enabled: true
    lid_fraction: 0.45
    corner_fraction: 0.25
    corner_width: 0.12

experiments:
  root: experiments
