benchmark: lid_driven_cavity
seed: 0
deterministic: true
device: auto
precision: float64
run_type: paper

benchmark_params:
  reynolds: 100.0
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  lid_velocity: 1.0
  reference: ghia
  reference_path: null
  full_field_reference_path: auto
  generate_full_field_reference: true
  reference_nx: 129
  reference_ny: 129
  reference_max_iter: 20000
  reference_tolerance: 1.0e-7
  profile_only: false
  profile_supervision:
    enabled: false
    label: sparse-data-assisted

pde:
  steady: true

model:
  kind: direct_uvp
  input_dim: 2
  output_dim: 3
  hidden_layers: [128, 128, 128, 128, 128]
  activation: tanh
  fourier_features:
    enabled: false
    num_features: 64
    scale: 4.0
    include_input: true

optimizer:
  name: adam_lbfgs
  lr: 0.001
  lbfgs:
    enabled: true
    max_iter: 500
    lr: 1.0
    history_size: 100
    line_search_fn: strong_wolfe
    tolerance_grad: 1.0e-10
    tolerance_change: 1.0e-12

training:
  adaptive_cycles: 10
  epochs_per_cycle: 500
  log_every: 50
  n_collocation: 10000
  n_boundary: 2000
  n_data: 0
  weights:
    pde: 1.0
    momentum_u: 1.0
    momentum_v: 1.0
    continuity: 2.0
    bc: 8.0
    u: 0.0
    v: 0.0
    p: 0.0
    omega: 0.0
    pressure_gradient: 0.0
    gpinn: 0.0

validation:
  nx: 96
  ny: 96

test:
  nx: 129
  ny: 129

diagnostics:
  mode: full_reference
  variables:
    - continuity_residual
    - momentum_u_residual
    - momentum_v_residual
    - aggregate_pde_residual
    - centerline_pde_residual
    - centerline_continuity_residual
    - corner_pde_residual
    - corner_boundary_error
    - boundary_violation
  aggregation: mean
  aggregation_percentile: 90.0
  normalization: percentile
  ema_rho: 0.7

patches:
  nx_patches: 6
  ny_patches: 6
  nt_patches: 1

weak_regions:
  percentile_threshold: 75.0
  top_k_per_variable: 2
  min_active_patches: 1
  max_active_patches: 10
  persistence_cycles: 1

local_controller:
  enabled: true
  constrained: true
  min_improvement: 0.005
  collateral_tolerance: 0.06
  pressure_collateral_tolerance: 0.04
  continuity_collateral_tolerance: 0.03
  boundary_collateral_tolerance: 0.004
  validation_loss_tolerance: 0.008
  pde_hard_tolerance: 0.004
  boundary_hard_tolerance: 0.002
  validation_loss_hard_tolerance: 0.004
  centerline_pde_hard_tolerance: 0.02
  corner_boundary_hard_tolerance: 0.004
  u_boundary_hard_tolerance: 0.004
  v_boundary_hard_tolerance: 0.004
  trial_epochs: 50
  max_actions_per_cycle: 4
  initial_strength: 0.25
  damping_factor: 0.5
  warmup_cycles: 2
  normalized_acceptance_objective: true
  tiny_j_tolerance: 0.001
  strong_target_factor: 2.0
  wall_patch_strength_factor: 0.65
  corner_patch_strength_factor: 0.45
  boundary_patch_margin: 1.0e-9
  rejection_recovery_epochs: 25
  local_velocity_weight_max: 1.5
  local_pressure_weight_max: 1.5
  local_omega_weight_max: 1.5
  local_pde_weight_max: 1.5
  local_bc_weight_max: 5.0
  objective_weights:
    residual: 0.5
    continuity: 2.0
    momentum: 0.75
    boundary: 3.0
    unweighted_validation: 0.75
    centerline_pde: 0.75
    centerline_continuity: 0.5
    corner_pde: 0.25
    corner_boundary: 1.0
    u_boundary: 0.5
    v_boundary: 0.75

sampling:
  mixture:
    uniform: 0.42
    pde_residual: 0.28
    pressure_vorticity: 0.08
    velocity: 0.10
    boundary: 0.12
  cavity_boundary:
    enabled: true
    lid_fraction: 0.46
    corner_fraction: 0.20
    corner_width: 0.12
    avoid_exact_corners: true
    corner_epsilon: 1.0e-4

experiments:
  root: experiments
